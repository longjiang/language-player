<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Language Player</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>
      <img src="language-player-logo-64.png" alt="" width="28" height="28" />
      <span id="popup-title">Language Player</span>
    </h1>

    <!-- Auth section -->
    <div id="auth-section">
      <div id="auth-logged-out">
        <p class="auth-hint" id="popup-login-prompt"></p>
        <input type="email" id="auth-email" />
        <input type="password" id="auth-password" />
        <button id="auth-login-btn"></button>
        <p id="auth-error" class="auth-error hidden"></p>
      </div>
      <div id="auth-logged-in" class="hidden">
        <span id="auth-user"></span>
        <button id="auth-logout-btn"></button>
      </div>
    </div>

    <!-- Instructions -->
    <div id="instructions">
      <p id="popup-instructions"></p>
      <ul>
        <li id="popup-click-word"></li>
        <li id="popup-save-words"></li>
        <li id="popup-toggle-shortcut"></li>
      </ul>
    </div>

    <!-- Transcript toggle -->
    <button id="transcript-btn" disabled></button>
    <p id="transcript-hint" class="hidden"></p>

  </div>
  <script src="popup.js"></script>
</body>
</html>
